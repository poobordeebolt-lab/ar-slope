<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>VTSS AR Pre-Survey</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="three"></canvas>

  <div id="hud">
    <div class="row">
      <div class="badge" id="status">กำลังเริ่มต้น…</div>
      <div class="badge" id="fps">-- fps</div>
    </div>
    <div class="row">
      <div class="badge">Lat <span id="lat">--</span></div>
      <div class="badge">Lon <span id="lon">--</span></div>
      <div class="badge">h <span id="hEll">--</span> m</div>
      <div class="badge">±<span id="acc">--</span> m</div>
    </div>
    <div class="row">
      <div class="badge">Heading <span id="hdg">--</span>°</div>
      <div class="badge">Pitch <span id="ptc">--</span>°</div>
      <div class="badge">Roll <span id="rll">--</span>°</div>
    </div>
    <div class="row" id="surfRow">
      <div class="badge">Surface ใต้ตำแหน่ง: <span id="surfBelow">--</span></div>
    </div>
  </div>

  <div id="controls">
    <button id="btnStart">เริ่มกล้อง + GPS</button>
    <button id="btnCal">Calibrate Heading</button>
    <label><input type="checkbox" id="chkOLS" checked> OLS</label>
    <label><input type="checkbox" id="chkOCS" checked> OCS</label>
    <label>Range
      <select id="rangeSel">
        <option value="1000">1 km</option>
        <option value="3000" selected>3 km</option>
        <option value="8000">8 km</option>
        <option value="20000">20 km</option>
      </select>
    </label>
    <label>Opacity <input type="range" id="opa" min="0.1" max="0.9" step="0.05" value="0.35"></label>
  </div>

  <div id="crosshair">+</div>

  <div id="legend">
    <div><span class="sw" style="background:#4fc3f7"></span>OLS Inner Horizontal</div>
    <div><span class="sw" style="background:#81c784"></span>OLS Conical</div>
    <div><span class="sw" style="background:#ffb74d"></span>OLS Approach</div>
    <div><span class="sw" style="background:#ff8a65"></span>OLS Take-off</div>
    <div><span class="sw" style="background:#ba68c8"></span>OLS Transitional</div>
    <div><span class="sw" style="background:#e57373"></span>OCS Area 2</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
