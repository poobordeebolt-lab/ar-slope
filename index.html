<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR OLS Viewer v5 (Vanilla)</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
  <script src="https://unpkg.com/earcut@2.2.4/dist/earcut.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: -apple-system, sans-serif; }

    /* Camera video as background */
    #cam-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Three.js canvas overlay */
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    #ui {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.78); color: white;
      padding: 6px 10px; z-index: 100;
      font-size: 11px; max-height: 25vh; overflow-y: auto;
    }
    #ui h3 { margin: 0 0 3px 0; font-size: 12px; }
    #status { font-family: monospace; font-size: 10px; line-height: 1.4; }
    .row { display: flex; justify-content: space-between; }
    .label { opacity: 0.7; }
    .good { color: #4ade80; } .warn { color: #fbbf24; } .bad { color: #f87171; }

    #file-input {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20,20,30,0.97); color: white;
      padding: 18px; border-radius: 14px;
      z-index: 200; text-align: center;
      width: 90%; max-width: 360px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      max-height: 92vh; overflow-y: auto;
    }
    #file-input h3 { margin: 0 0 8px 0; font-size: 16px; }
    #file-input button {
      display: block; width: 100%; padding: 11px; margin: 6px 0;
      background: #2563eb; color: white; border: none;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      font-weight: 600;
    }
    #file-input button:disabled { background: #444; color: #888; }
    #file-input button.start-btn { background: #16a34a; font-size: 15px; padding: 13px; }
    #file-input button.start-btn:disabled { background: #444; }
    #file-input .file-label {
      display: block; width: 100%; padding: 12px; margin: 6px 0;
      background: #1e40af; color: white; border: 2px dashed #60a5fa;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      font-weight: 500;
    }
    .file-label.has-file { background: #166534 !important; border-color: #4ade80 !important; }
    #file-input input[type=file] { display: none; }
    #file-status {
      font-size: 10px; padding: 6px;
      background: rgba(0,0,0,0.4); border-radius: 6px;
      margin: 6px 0; min-height: 16px;
      font-family: monospace;
    }
    .opts {
      display: flex; gap: 6px; align-items: center;
      justify-content: space-between; margin: 6px 0; font-size: 11px;
      padding: 6px 8px; background: rgba(255,255,255,0.05); border-radius: 6px;
    }
    .opts input[type=number] {
      width: 70px; padding: 5px; border-radius: 6px;
      border: 1px solid #555; background: #222; color: white; font-size: 11px;
    }
    .opts label.checkbox {
      display: flex; align-items: center; gap: 6px;
      width: 100%; cursor: pointer; font-size: 12px;
    }
    .opts input[type=checkbox] { width: 16px; height: 16px; }

    #minimap-container {
      position: fixed;
      bottom: 50px; right: 8px;
      z-index: 110;
      background: rgba(0,0,0,0.75);
      border: 2px solid #4ade80;
      border-radius: 50%;
      padding: 4px;
      display: none;
    }
    #minimap { display: block; border-radius: 50%; }

    #legend {
      position: fixed; bottom: 8px; left: 8px; right: 8px;
      background: rgba(0,0,0,0.78); color: white;
      padding: 5px 8px; border-radius: 8px;
      font-size: 9px; z-index: 100;
      display: none; flex-wrap: wrap; gap: 6px; justify-content: center;
    }
    .swatch { display: inline-block; width: 9px; height: 9px; margin-right: 3px; vertical-align: middle; border-radius: 2px; }

    #log {
      position: fixed; top: 28%; left: 8px; right: 8px;
      background: rgba(0,0,0,0.88); color: #4ade80;
      padding: 8px; border-radius: 8px;
      font-family: monospace; font-size: 9px;
      z-index: 150; max-height: 40vh; overflow-y: auto;
      display: none; white-space: pre-wrap;
    }

    #floating-ctrl {
      position: fixed; right: 8px; top: 28%;
      display: none;
      flex-direction: column; gap: 6px;
      z-index: 110;
    }
    #floating-ctrl button {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(37, 99, 235, 0.9);
      color: white;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<!-- Camera background -->
<video id="cam-video" autoplay playsinline muted></video>

<!-- Three.js canvas -->
<canvas id="three-canvas"></canvas>

<div id="file-input">
  <h3>AR OLS Viewer v5</h3>
  <p style="font-size:10px;opacity:0.7;margin:2px 0">Vanilla Three.js + getUserMedia</p>

  <label for="geojson-file" class="file-label" id="file-label">
    📂 แตะเพื่อเลือกไฟล์
  </label>
  <input type="file" id="geojson-file" accept=".geojson,.json,application/json">

  <div id="file-status">ยังไม่ได้เลือกไฟล์</div>

  <div class="opts">
    <span>รัศมี:</span>
    <span><input type="number" id="render-radius" value="8000" min="200" max="20000" step="500"> m</span>
  </div>

  <div class="opts">
    <span>Surface offset Y:</span>
    <span><input type="number" id="surface-offset" value="0" min="-500" max="500" step="5"> m</span>
  </div>

  <div class="opts">
    <label class="checkbox">
      <input type="checkbox" id="auto-fit" checked>
      <span>Auto-fit สูง</span>
    </label>
  </div>

  <div class="opts">
    <label class="checkbox">
      <input type="checkbox" id="debug-markers" checked>
      <span>Debug markers (N/S/E/W)</span>
    </label>
  </div>

  <div class="opts">
    <label class="checkbox">
      <input type="checkbox" id="test-mode">
      <span>โหมดทดสอบ</span>
    </label>
  </div>

  <button class="start-btn" id="start-btn" onclick="startAR()" disabled>
    ▶ เริ่มดู AR
  </button>

  <p style="font-size:9px;opacity:0.6;margin:4px 0">
    อนุญาต Camera + Location + Motion sensors<br>
    ครั้งแรก: หันหน้าไปทาง <b>เหนือ</b> ก่อนกดเริ่ม
  </p>
</div>

<div id="ui" style="display:none">
  <h3>AR OLS v5</h3>
  <div id="status">เริ่มต้น...</div>
</div>

<div id="legend">
  <div><span class="swatch" style="background:#3b82f6"></span>Inner H</div>
  <div><span class="swatch" style="background:#8b5cf6"></span>Conical</div>
  <div><span class="swatch" style="background:#22c55e"></span>Approach</div>
  <div><span class="swatch" style="background:#f59e0b"></span>Take-off</div>
  <div><span class="swatch" style="background:#ec4899"></span>Trans</div>
</div>

<div id="minimap-container">
  <canvas id="minimap" width="180" height="180"></canvas>
</div>

<div id="floating-ctrl">
  <button onclick="adjustHeight(-10)">⬇</button>
  <button onclick="adjustHeight(10)">⬆</button>
  <button onclick="toggleLog()">🔍</button>
</div>

<div id="log"></div>

<script src="app.js"></script>
</body>
</html>
